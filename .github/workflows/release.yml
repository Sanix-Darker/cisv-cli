name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (example: v0.4.6). Defaults to v<VERSION>."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Update cisv-core submodule to latest main
        run: git submodule update --init --remote --recursive
      - name: Resolve release version and tag
        id: meta
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="v${VERSION}"
          fi
          [ "${TAG#v}" = "${VERSION}" ] || {
            echo "Tag/version mismatch: tag=${TAG} VERSION=${VERSION}"
            exit 1
          }
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Install build and packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ruby ruby-dev
      - name: Build and test
        run: |
          make all
          make test
      - name: Build release artifacts
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          mkdir -p dist
          tar -czf "dist/cisv-cli-${VERSION}-linux-amd64.tar.gz" -C cli/build cisv -C docs/man cisv.1

          docker run --rm -v "$PWD:/work" -w /work ghcr.io/goreleaser/nfpm:v2.41.2 \
            package --packager deb --config ./packaging/nfpm.yaml \
            --target "dist/cisv-cli_${VERSION}_amd64.deb"
          docker run --rm -v "$PWD:/work" -w /work ghcr.io/goreleaser/nfpm:v2.41.2 \
            package --packager rpm --config ./packaging/nfpm.yaml \
            --target "dist/cisv-cli-${VERSION}-1.x86_64.rpm"
          docker run --rm -v "$PWD:/work" -w /work ghcr.io/goreleaser/nfpm:v2.41.2 \
            package --packager apk --config ./packaging/nfpm.yaml \
            --target "dist/cisv-cli-${VERSION}-r1.x86_64.apk"

          sha256sum dist/* > dist/sha256sums.txt
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*
      - name: Publish .deb/.rpm to Packagecloud (optional)
        env:
          PACKAGECLOUD_TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}
          PACKAGECLOUD_REPO: ${{ secrets.PACKAGECLOUD_REPO }}
        run: |
          set -euo pipefail
          if [ -z "${PACKAGECLOUD_TOKEN:-}" ] || [ -z "${PACKAGECLOUD_REPO:-}" ]; then
            echo "PACKAGECLOUD_TOKEN or PACKAGECLOUD_REPO is not configured; skipping apt/rpm repo publish."
            exit 0
          fi
          gem install package_cloud --no-document
          package_cloud push "${PACKAGECLOUD_REPO}/ubuntu/jammy" dist/*.deb
          package_cloud push "${PACKAGECLOUD_REPO}/debian/bookworm" dist/*.deb
          package_cloud push "${PACKAGECLOUD_REPO}/el/9" dist/*.rpm
