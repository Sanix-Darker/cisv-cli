name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make all
      - run: tar -czf cisv-cli-${GITHUB_REF_NAME}.tar.gz cli/build/cisv
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            cisv-cli-${{ github.ref_name }}.tar.gz
